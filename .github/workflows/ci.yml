name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  server:
    name: server / go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Resolve modules
        run: go mod tidy
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: server
      - name: Format check
        run: golangci-lint fmt --diff ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -race -count=1

  mobile:
    name: mobile / ts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run fmt:check
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
