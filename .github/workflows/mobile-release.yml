name: mobile-release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  android:
    if: startsWith(github.event.release.tag_name, 'mobile-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Raise Gradle heap
        # Expo's generated gradle.properties sets -Xmx around 2–4GB, which
        # OOMs under JetifyTransform on ubuntu-latest. Override by appending
        # a larger heap — Gradle reads later entries last, so ours wins.
        run: |
          cat >> android/gradle.properties <<'EOF'

          # aura CI overrides
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
          org.gradle.workers.max=2
          EOF

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Collect APK
        id: apk
        run: |
          v="${GITHUB_REF_NAME#mobile-}"
          src=$(find android/app/build/outputs/apk -type f -name "*.apk" | head -n 1)
          if [ -z "$src" ]; then
            echo "No APK produced"; exit 1
          fi
          out="aura-${v}.apk"
          cp "$src" "$out"
          sha256sum "$out" > "${out}.sha256"
          echo "apk=$out" >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        working-directory: mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.apk.outputs.apk }}" \
            "${{ steps.apk.outputs.apk }}.sha256" \
            --clobber
