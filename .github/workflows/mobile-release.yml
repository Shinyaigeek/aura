name: mobile-release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  android:
    if: startsWith(github.event.release.tag_name, 'mobile-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        id: apk
        run: |
          v="${GITHUB_REF_NAME#mobile-}"
          src=$(find android/app/build/outputs/apk -type f -name "*.apk" | head -n 1)
          if [ -z "$src" ]; then
            echo "No APK produced"; exit 1
          fi
          out="aura-${v}.apk"
          cp "$src" "$out"
          sha256sum "$out" > "${out}.sha256"
          echo "apk=$out" >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        working-directory: mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.apk.outputs.apk }}" \
            "${{ steps.apk.outputs.apk }}.sha256" \
            --clobber
