name: mobile-release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    # Only fire on mobile-prefixed release tags.
    if: startsWith(github.event.release.tag_name, 'mobile-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS build
        # Non-interactive, no-wait: EAS runs the build on its own runners and
        # attaches installable artifacts to the Expo project. The GitHub
        # Action just kicks it off and returns.
        run: |
          eas build \
            --profile preview \
            --platform all \
            --non-interactive \
            --no-wait
