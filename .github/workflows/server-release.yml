name: server-release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    # Only fire on server-prefixed release tags.
    if: startsWith(github.event.release.tag_name, 'server-v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Resolve version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#server-}" >> "$GITHUB_OUTPUT"

      - name: Resolve modules
        working-directory: server
        run: go mod tidy

      - name: Build and package
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          v="${{ steps.version.outputs.version }}"
          dir="aura-server-${v}-${GOOS}-${GOARCH}"
          mkdir -p "dist/$dir"
          ldflags="-s -w -X main.version=${v}"
          go build -trimpath -ldflags "$ldflags" -o "dist/$dir/aura-server" ./cmd/aura-server
          cp README.md "dist/$dir/README.md"
          cp deploy/aura-server.service "dist/$dir/"
          cp deploy/aura.env.example "dist/$dir/"
          tar -C dist -czf "dist/${dir}.tar.gz" "$dir"
          (cd dist && sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256")

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.version.outputs.version }}"
          dir="aura-server-${v}-${{ matrix.goos }}-${{ matrix.goarch }}"
          gh release upload "${{ github.event.release.tag_name }}" \
            "server/dist/${dir}.tar.gz" \
            "server/dist/${dir}.tar.gz.sha256" \
            --clobber
